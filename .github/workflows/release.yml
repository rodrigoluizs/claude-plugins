name: Release Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Comma-separated list of plugin names to release (e.g. "maintenance,product")'
        required: true
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  detect:
    if: github.actor != 'rodrigoluizs-release[bot]'
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: detect
        env:
          INPUT_PLUGINS: ${{ inputs.plugins }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -n "$INPUT_PLUGINS" ]; then
            PLUGINS=$(echo "$INPUT_PLUGINS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep '.')
          else
            PLUGINS=$(bash .github/scripts/detect-changed-plugins.sh \
              "$BEFORE_SHA" \
              "$HEAD_SHA")
          fi
          # Validate: plugin names must be lowercase kebab-case and exist as directories
          while IFS= read -r name; do
            if ! echo "$name" | grep -qE '^[a-z][a-z0-9]*(-[a-z0-9]+)*$'; then
              echo "::error::Invalid plugin name: $name"
              exit 1
            fi
            if [ ! -d "plugins/$name" ]; then
              echo "::error::Plugin directory not found: plugins/$name"
              exit 1
            fi
          done <<< "$PLUGINS"
          echo "Found changed plugins: $PLUGINS"
          JSON=$(echo "$PLUGINS" | jq -Rsc '[split("\n")[] | select(length > 0)]')
          echo "plugins=$JSON" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
      fail-fast: true
    steps:
      - name: Get release bot token
        id: get-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.get-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "rodrigoluizs-release[bot]"
          git config user.email "rodrigoluizs-release[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release-it
        run: |
          cd plugins/${{ matrix.plugin }}
          jq --arg prefix "${{ matrix.plugin }}/" \
            '.plugins["@release-it/conventional-changelog"].tagOpts.prefix = $prefix' \
            ../../.github/.release-it.json > /tmp/.release-it.json
          npx release-it \
            --config /tmp/.release-it.json \
            --git.tagName='${{ matrix.plugin }}/v${version}' \
            --git.commitMessage='chore(release): ${{ matrix.plugin }} v${version}' \
            --ci

      - name: Upload release artifacts
        run: |
          mkdir -p /tmp/artifacts/plugins/${{ matrix.plugin }}/.claude-plugin
          cp plugins/${{ matrix.plugin }}/CHANGELOG.md /tmp/artifacts/plugins/${{ matrix.plugin }}/
          cp plugins/${{ matrix.plugin }}/.claude-plugin/plugin.json /tmp/artifacts/plugins/${{ matrix.plugin }}/.claude-plugin/

      - uses: actions/upload-artifact@v7
        with:
          name: release-files-${{ matrix.plugin }}
          path: /tmp/artifacts/
          include-hidden-files: true

  update-and-pr:
    needs: [detect, release]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Get release bot token
        id: get-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.get-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "rodrigoluizs-release[bot]"
          git config user.email "rodrigoluizs-release[bot]@users.noreply.github.com"

      - name: Fetch new tags
        run: git fetch --tags

      - name: Download release artifacts
        run: |
          for plugin in $(echo '${{ needs.detect.outputs.plugins }}' | jq -r '.[]'); do
            gh run download "${{ github.run_id }}" \
              --name "release-files-${plugin}" \
              --dir /tmp/artifacts
          done
          cp -r /tmp/artifacts/. .
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Update marketplace.json from plugin.json files
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          with open(".claude-plugin/marketplace.json") as f:
              data = json.load(f)

          for entry in data["plugins"]:
              plugin_json = Path(f"plugins/{entry['name']}/.claude-plugin/plugin.json")
              if plugin_json.exists():
                  with open(plugin_json) as f:
                      entry["version"] = json.load(f)["version"]

          with open(".claude-plugin/marketplace.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYEOF

      - name: Create release branch, tags, and PR
        run: |
          BRANCH="chore/release-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add plugins/ .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(release): update plugin files and marketplace"
          COMMIT_SHA=$(git rev-parse HEAD)
          git push origin "$BRANCH"

          # Tag the commit that will land on main for each released plugin.
          # Using --merge (not --squash) below preserves this SHA so tags stay reachable.
          for plugin in $(echo '${{ needs.detect.outputs.plugins }}' | jq -r '.[]'); do
            VERSION=$(jq -r '.version' "plugins/$plugin/.claude-plugin/plugin.json")
            TAG="$plugin/v$VERSION"
            echo "Tagging $TAG -> $COMMIT_SHA"
            git tag "$TAG" "$COMMIT_SHA"
            git push origin "$TAG"
          done

          PR_URL=$(gh pr create \
            --title "chore(release): update plugin files and marketplace" \
            --body "Automated release: updates CHANGELOG.md, plugin.json, and marketplace.json for released plugins." \
            --base main \
            --head "$BRANCH")
          # --merge (not --squash) preserves the commit SHA that tags point to
          gh pr merge "$PR_URL" --auto --merge
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
