name: Release Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: detect
        run: |
          PLUGINS=$(bash .github/scripts/detect-changed-plugins.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}")
          echo "Found changed plugins: $PLUGINS"
          JSON=$(echo "$PLUGINS" | python3 -c "import sys, json; print(json.dumps(sys.stdin.read().split()))")
          echo "plugins=$JSON" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
      fail-fast: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release-it
        run: |
          cd plugins/${{ matrix.plugin }}
          npx release-it \
            --config ../../.github/.release-it.json \
            --git.tagName='${{ matrix.plugin }}/v${version}' \
            --git.commitMessage='chore(release): ${{ matrix.plugin }} v${version}' \
            --ci

      - name: Push tag
        run: |
          cd plugins/${{ matrix.plugin }}
          NEW_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          git push origin "${{ matrix.plugin }}/v${NEW_VERSION}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files-${{ matrix.plugin }}
          path: |
            plugins/${{ matrix.plugin }}/CHANGELOG.md
            plugins/${{ matrix.plugin }}/.claude-plugin/plugin.json

  update-and-pr:
    needs: [detect, release]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch new tags
        run: git fetch --tags

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-files-*
          merge-multiple: true

      - name: Update marketplace.json
        run: |
          python3 - <<'PYEOF'
          import json, subprocess

          with open(".claude-plugin/marketplace.json") as f:
              data = json.load(f)

          for plugin in data["plugins"]:
              name = plugin["name"]
              result = subprocess.run(
                  ["git", "tag", "-l", f"{name}/v*"],
                  capture_output=True, text=True
              )
              tags = [t for t in result.stdout.strip().split("\n") if t]
              if tags:
                  tag = sorted(tags)[-1]
                  plugin["version"] = tag.split("/v", 1)[-1]

          with open(".claude-plugin/marketplace.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYEOF

      - name: Create release branch and PR
        run: |
          BRANCH="chore/release-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add plugins/ .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(release): update plugin files and marketplace"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(release): update plugin files and marketplace" \
            --body "Automated release: updates CHANGELOG.md, plugin.json, and marketplace.json for released plugins." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
