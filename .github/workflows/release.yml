name: Release Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    if: github.actor != 'rodrigoluizs-release[bot]'
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: detect
        run: |
          PLUGINS=$(bash .github/scripts/detect-changed-plugins.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}")
          echo "Found changed plugins: $PLUGINS"
          JSON=$(echo "$PLUGINS" | jq -Rsc '[split("\n")[] | select(length > 0)]')
          echo "plugins=$JSON" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
      fail-fast: true
    steps:
      - name: Get release bot token
        id: get-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.get-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "rodrigoluizs-release[bot]"
          git config user.email "rodrigoluizs-release[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release-it
        run: |
          cd plugins/${{ matrix.plugin }}
          npx release-it \
            --config ../../.github/.release-it.json \
            --git.tagName='${{ matrix.plugin }}/v${version}' \
            --git.commitMessage='chore(release): ${{ matrix.plugin }} v${version}' \
            --ci

      - name: Push tag
        run: |
          cd plugins/${{ matrix.plugin }}
          NEW_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          git push origin "${{ matrix.plugin }}/v${NEW_VERSION}"

      - name: Upload release artifacts
        run: |
          mkdir -p /tmp/artifacts/plugins/${{ matrix.plugin }}/.claude-plugin
          cp plugins/${{ matrix.plugin }}/CHANGELOG.md /tmp/artifacts/plugins/${{ matrix.plugin }}/
          cp plugins/${{ matrix.plugin }}/.claude-plugin/plugin.json /tmp/artifacts/plugins/${{ matrix.plugin }}/.claude-plugin/

      - uses: actions/upload-artifact@v4
        with:
          name: release-files-${{ matrix.plugin }}
          path: /tmp/artifacts/
          include-hidden-files: true

  update-and-pr:
    needs: [detect, release]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Get release bot token
        id: get-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.get-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "rodrigoluizs-release[bot]"
          git config user.email "rodrigoluizs-release[bot]@users.noreply.github.com"

      - name: Fetch new tags
        run: git fetch --tags

      - name: Download release artifacts
        run: |
          for plugin in $(echo '${{ needs.detect.outputs.plugins }}' | jq -r '.[]'); do
            gh run download "${{ github.run_id }}" \
              --name "release-files-${plugin}" \
              --dir /tmp/artifacts
          done
          cp -r /tmp/artifacts/. .
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Update marketplace.json
        run: |
          python3 - <<'PYEOF'
          import json, subprocess

          with open(".claude-plugin/marketplace.json") as f:
              data = json.load(f)

          for plugin in data["plugins"]:
              name = plugin["name"]
              result = subprocess.run(
                  ["git", "tag", "-l", f"{name}/v*"],
                  capture_output=True, text=True
              )
              tags = [t for t in result.stdout.strip().split("\n") if t]
              if tags:
                  tag = sorted(tags)[-1]
                  plugin["version"] = tag.split("/v", 1)[-1]

          with open(".claude-plugin/marketplace.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYEOF

      - name: Create release branch and PR
        run: |
          BRANCH="chore/release-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add plugins/ .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(release): update plugin files and marketplace"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(release): update plugin files and marketplace" \
            --body "Automated release: updates CHANGELOG.md, plugin.json, and marketplace.json for released plugins." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
