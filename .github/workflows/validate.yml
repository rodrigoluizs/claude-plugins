name: Validate Plugins

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: Detect Plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: List all plugins
        id: detect
        run: |
          PLUGINS=$(ls -d plugins/*/ | cut -d'/' -f2 | python3 -c "import sys, json; print(json.dumps(sys.stdin.read().split()))")
          echo "Found plugins: $PLUGINS"
          echo "plugins=$PLUGINS" >> "$GITHUB_OUTPUT"

  validate-lockfile:
    name: Validate Lock File
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate lock file
        run: npm ci

  validate-marketplace:
    name: Validate Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace
        run: claude plugin validate .

  validate-plugin:
    name: Validate / ${{ matrix.plugin }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin
        run: |
          cd "$GITHUB_WORKSPACE/plugins/${{ matrix.plugin }}"
          claude plugin validate .
